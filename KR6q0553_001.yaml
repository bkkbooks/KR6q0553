body:
  text: 嗣法門人普明編刊明俊記録示衆七夕檀越供斗請師示衆云檀越登范李居士夙具靈根素培智種作功德事普衆霑恩特塑斗君請琛上座安位且道如何祝讚面南看北斗薰風自南來薦得其中意頂門眼自開檀越興慈念蓮邦長寶臺七星常送福九曜盡除災作麼生是應時及節句喝一喝云今日是七夕何用巧安排般若禪院打七師示衆云今日檀越董夫人設齊供衆監院同衆職事堅請開示琛上座不敢囊藏被蓋未免借檀越無盡之光續先法兄未了之案若據正眼觀來也是鉢盂安柄這箇般若院子十餘年來宗鏡高懸不意我先法兄移化他方翛然長往而今法道寥寥印心監院願力洪深欲報前人一生苦志盡力撐持逆水舟隻手扶起剎竿子為衆竭力請琛上座到此作箇坐禪底樣子琛上座別無長處秪要與諸人解黏去縛拔楔抽釘人人鼻孔撩天箇箇腳跟立地一切處透得過見得徹不被境緣所轉不被言語所滯須知各各自有本地風光不假他人著力解脫門八字打開正法眼當陽顯示秪如把斷要津不通凡聖諸人畢竟從甚麼處入琛上座不惜眉毛通箇消息豎拂子云見麼擊一下云聞麼既是聞見分明且如何是徹證一句擲拂云絲綸拋向清波裏且待鯨鯢上釣來拽拄杖歸方丈重陽示衆師云德越禪人歷然上座辦趙州茶雲門餅與衆兄弟結般若緣衆中還有知味者麼若無琛上座為汝諸人道破去也風颯颯雨霏霏應時及節饑則食冷添衣爾我共知拈起也全彰妙用放下也迥絶離金風黃葉墮脫體露真機禪家不用茱萸酒一盞清茶釋衆疑復舉趙州和尚見有人參便云喫茶去且道意旨如何良久云趙州老漢布箇縵天網子只待無面目漢撞人琛上座則不然棋逢敵手琴遇知音雖然汝等諸人還知趙州老漢婆心麼卓拄杖云參示衆吾宗無語句亦無一法與人衲僧分上本無說長道短但是今晚普茶若道施主設底又是監院來請若道監院設底又是施主所供此意作麼生會諸人若緇素得出拈餅剝果酬恩有分其或未然一隊盡是德山羅漢昔有僧問疏山如何是冬來意山云京師出大黃若有人問琛上座如何是冬來意即向道朔風凜凜撲入寒大衆明日立冬了且如何是冬來意衆無語師云山僧有箇頌子與諸人說月色朦朧樹影微冬來消息少人知疏山一句分明道劈面提持不識渠識得渠釋迦彌勒盡皈依且道承誰恩力驀拈拄杖云惟有這條拄杖子東土西天不受拘解制示衆孤掌不浪鳴獨樹不成林建法幢立宗旨須要大家著力今日解開布袋口放出水牯牛一任東行西行切忌犯他苗稼若論辦道之功本無結解茲因末法澆漓多諸識見操履日微偷心不死所以三七日畫地為牢無繩自縛我也無奇言妙句搜索枯腸只要汝等將無量劫來攀緣妄想得失是非一齊放下惟以生死二字帖在額前結也如是解也如是聚也如是散也如是不分動靜去來不辨冷暖飢渴拚這一生不著若不明白決定不休能具如是大志自然有到家時節琛上座與衆在此一期攪擾無以相酬欲與諸人索些飯錢償還空王庫內有麼有麼衆無語師卓拄杖云和盤托出無人會分付東風自主張示衆汝等諸人欲明生死大事特來相依貧道求出世因直須拚命一番雖則衆中也有久參者也有初進者蓋為生死心不切提起則有不提則無念話頭過時所以不能透悟而今不要你們操持常住錢糧又不要你們外邊攀緣涉世只要你將箇一歸何處晝參夜參無論閒忙動靜無論逆順喜怒遇飯喫飯遇茶喫茶孜孜汲汲切切拳拳如鐵橛子相似稍有雜念起時即舉本參話頭如金剛王寶劍直下看這雜念從何處起咬定牙根豎起脊梁工夫自然成片參到不舉自舉不提自提胸次中覺得氣氣悶悶推之不去蕩之不散此際工夫再不可放手亦不可執著坐相如若睡魔起時便下單抖擻精神向本參上追究急切提撕一回睡魔自然退矣自要發箇勇猛千期萬期以悟為期若能如是恆常不怠那怕甕中走卻鱉此事亦不得性急你看古人動經十年二十年揩磨得一點氣息也無所以得到這般田地今人切忌草草光陰易過時不待人各自努力葛藤未盡更說一偈話頭提起利如鋒犯者從教絶影蹤劣性初調頻著力牧童鞭策莫相容警衆既為如來弟子圓頂方袍必要立向上志發堅固心莫辜負佛祖建立垂慈之德莫辜負國王外護水土之恩莫辜負父母師長養育剃度之情莫辜負自己辭親割愛出家之志莫虛消信施莫虛度光陰無常老病不與人期轉眼便是來生莫被閻羅老子索你飯錢縱有親爺親娘救你不得縱有相契善友替你不回閻羅王不怕你口尖舌快牽入六道四生悔之晚矣所以古云此身不向今生度更向何生度此身何不趁此色力強健四大安康猛烈一番討箇明曰今幸處閒居靜室明淨僧堂粥飯不缺茶湯穩便汝等若不做工夫真為下劣愚癡漢矣二六時中將箇話頭頓在面前豎起脊梁開著兩眼如貓捕鼠不容走作念茲在茲默默參究須瓣一片恆常不退之志晝夜無間逆順一如汝等秖為看得生死事輕所以被無明煩惱雜念分飛障閉悟門或昏沉散亂攪作一團或有頭無尾中道而止或參到無滋味處便要丟手此乃參禪人最忌之病若能依我說話自然有發明日子珍重圓通大士開光師云世間一切有為無不皆從願力而生這段公案乃義公法兄夢感發心多緣時節不至面目未彰故爾擔閣至今若非諸檀護出手相扶妙莊嚴相焉能成就然而大象無形云何有相正是月臨千澗花發陽春菩薩三十二應無剎不現身善財五十三參有緣方住足今日伏獅院裏大士降生了也且道有何祥瑞豎拂云大衆見麼大士在山僧拂子頭上現百千三昧而為說法且道說什麼法不見一法即如來是則名為觀自在以是因緣我先法兄了其宿願常寂光中得大自在十方信施發菩提心各霑法味得大自在現前大衆耳觀目聽徹證圓通得大自在且如何是自在一句以拂子點云點出寶光千古秀雍雍法相啓圓通除夕示衆師云古人烹露地白牛與衆分歲山僧想一回不必不必露地白牛衆兄弟各各自有何用醉後添杯參同今年新建齊堂不免將箇新字與衆說說且道新箇甚麼家家戶戶鑼鼓震天貼一副新門對換一套新衣帽自謂外面簇簇齊新卻不曉內中無明知見惡辣餕酸依舊總不顧著惟我道人家明明歷歷一切平常也無新衣新帽也不換舊裝新但把一年三百六十日從頭記取一遍莫有臭糟甕不曾洗淨莫有陳年宿債未曾償還莫有母胎裏帶的習氣未除莫有無始以來業根未拔一向灰灰頽頽懈怠過了逗到臘月三十日畢竟要樁樁檢過不可留一毫污于心田切須盡底掀翻通新換一副勇猛利智提起本參話頭日日新又日新只管如斯進步方是斬新一句如何得應箇時節去參同院裏起樓臺如把青蓮石上栽爆竹聲中殘臘去梅花香裏送春來珍重歸堂乙卯冬檀越請師復住伏獅升座拈香云此一瓣香花開金栗果結梅溪昔年蕩盡家私今日衆前拔本爇向爐中端為供養前住伏獅上祗下園先老和尚用酬法乳之恩斂衣就坐乃云九年辭退歸林下豈肯重來作主人秖為靈山舊公案當陽拈出辨諸人莫有傍不甘者出衆相見良久云其或未然細與諸人道破去聖時遙魔強法弱所以琛上座一生效古風規不與時人鬥勝正好衲被蒙頭杜門養拙不意潯溪梅里檀越護法深念祖庭聲墜列派分疆法道異端豈能坐視再三堅請復住伏獅琛上座勉遵台命即得應箇時節不過列職安衆嚴整一番然而衲僧家作用貴乎德性仁慈履踐真實精持戒行敬守清規心同杲日之明志若冰霜之冷庶是法門當家種草堪與佛祖血脈貫通且道恁麼人行恁麼事震威一喝云吼斷群狐蹤影絶禪林從此清如鏡分付西堂與副寺隨緣住止遵其令卓拄杖下座釋迦文佛開光在初西堂請小參師云如來紫磨金色之身天下名藍古剎若大若小庵寺阿誰不供養者豈特參同啓模作樣有何奇異過人秖緣末法時輩善觀世尊旃檀之妙相不向世尊血脈上流通然而琛上座造殿塑佛實不為鬧熱門庭欲令諸仁者閒忙動靜之中薦取拈華之旨觸目遇緣悟佛知見山僧雖則立願數載獨掌豈得浪鳴幸蒙郡縣縉紳護法城郭檀越士民各庵法弟兄輩布法財于無盡寶藏種靈苗于劫外心田共手相扶圓成聖像今日釋迦老子降誕王宮指天指地周行目顧忒煞賣盡風流既是未出母胎度人已畢說法四十九年也是重添注腳末後靈山會上拈華示衆只因老不歇心彼時百萬人天罔測惟迦葉頭陀破顏微笑從此葛藤蔓起纍及西天四七東土二三歷代老古錐祖祖相傳至南嶽下第三十七世琛上座有恩難報有屈無伸不免將箇現成公案當陽剖露一上也要大家知得顧視左右云大衆且道世尊拈華與山僧豎拂是同是別於此透遢者不妨隨處作主遇緣即宗行也得住也得收也得放也得其或未然更聽一偈昔日靈山今亦然追風良驥猛加鞭人人具有摩醯眼照破乾坤萬古傳以拂子指云點偈哭本師祗老和尚折心磨琢幾春秋午夢驚殘淚未收嘆息離師何太早家私蕩盡不知愁幾見青黃不事師子規啼遍落花枝傷心愁聽三回喚靜掩柴扉風雨時寄義公法兄次前韻祖庭高峻淨如秋萬象森羅一句收春至自然花發錦馨香遍界復何愁續焰燈光不異師禪林鬱鬱長新枝門庭重整全君力正是拋綸擲釣時辭梅溪諸護法自脫巾瓶隱碧溪埋名誓不出幽居禪宗說法如雲疊祖印高懸別請提入理深談君自會涉言形筆眼中翳當陽一句無私語千古昭然豈再移頌青草池塘處處蛙四首驀將一問驗來由祖意明明百草頭逼塞太虛充八安身何處不風流體露真機正令開謾隨聲色亂胡猜縱饒說得天花墜也是拖泥帶水來問著池塘意已深聲聲那箇是知音而今舉起當年事依舊絃歌調轉新一段真風絶覆藏晴空皎月映池塘要知聞見非他物倒用橫拈總不妨挽義公法兄夢覺含悲聽曉鐘空彈血淚染丹楓追思共唱無生曲何意風吹別調中禁足九旬收足且偷閒欲了殘經對月看有耳不聞塵俗事薰風透戶憶高賢自愧才疏遁古溪抱痾終日掩雙扉藤蘿密密無人到林鳥時談向上機冷看浪走法門衰畫地為牢自活埋倏忽夏回秋又杪剛剛學得一癡呆題鏡相逢覿面觸人惺箇裏無私物物親我愛秋波清徹底胡來漢現不留情金粟受具大蓮聽和尚贈偈次韻二首附原韻衣到曹溪便不傳亦無實法為人宣伏獅門下能翻擲一任袈裟覆大千霜寒雪冷不知年千里神駒更著鞭金粟山頭重勘過宗風戒月自孤圓袈裟誰是得真傳今日當陽不用宣九十九峰環寶座禹門三級浪滔天冷淡平懷不記年任他閒臥懶施鞭祖翁田地何勞問到處風光得自便禮金粟弘覺老和尚御筆像讚御筆親將妙相圖瞻之誰不骨毛蘇三生道德鳴千古萬善風規化五湖金粟令行家國振玉街閒步杖藜扶法堂濟濟多龍象祖席重光啓範模史王育子立蓮辦像讚幼名興孫興孫興孫一葉翩翩浪裏行莫道嬰兒無箇事母胎未出度群生咄識得浪平元是水何須傳上巧舟青李貞女讚南州有李種性天然歲寒松柏火裏青蓮表我同儔清節可宣徐姬繼武龐女比肩羡兮慕兮深閨沒齒欽兮即兮事親克己靈鳥銜丹孝感有幾激揚貞風光我梓里奠義公禪師惟我法兄和尚一生行履孤硬七載繼席伏獅逆順艱辛無量應用人天莫測臨機佛祖不讓現前若僧若俗咸謂法門榜樣須彌峰頂駕鐵舟燈籠露柱齊聲唱同條悲痛無可伸聊以瓣香為供養重陽示衆霧鎖煙雲迷宇宙須防路滑莫登高連朝風雨惺惺著黃菊閒閒笑汝曹贈圓明徹圓上人偶來乞化寓圓明面面相看舊主人參透威音一著子冰輪徹照臥閒身贈瑞宗上人持鉢持鉢街頭效古風心心無間絶遍中穿廊入市承渠力舊令新行是瑞宗贈種福菴德如上人持鉢種德幽深福自全赤心無倦爾為先從茲識得通津路萬里程途指顧間托鉢回警衆黏霜帶霧不辭勞北往南來暮與朝秖為日餐無米飯閒名落遍有人嘲凎圈栗棘君須透玉粒香羹豈易消得箇知音密啓意呈橈舞棹共逍遙和禪坐偈五首步原韻打破重關隨處安無心于物更瀟然閒來危坐松陰下漸看蟾蜍東上懸假饒說法墜天華擬議尋思被物遮觸境遇緣無不是敲空取髓作生涯浩浩談玄疊似雲相逢難得箇知音紅爐突出超凡志宿有天機轉法輪勞生汩汩恣貪嗔頓發心花大地春烹雪煮茶消白晝胸懷廓徹若冰輪輕舟帶月水生花菡萏花開暗度香聞見覺知無別法頭陀懶散髮垂長遠眺勝音禪院樓成占此以贈高插層樓迥碧天疏梅翠竹繞空檐相看覿面無回互源遠流長作渡船湘南湘北本同源出入相逢絶正偏月滿樓頭人境靜光吞萬象照無邊壽明覺孫老夫人七秩自武林歸覷破繁華二十年諸緣懶涉愛逃禪滿庭芳桂新枝發半閣幽蘭擁壽筵般若會中趨進步菩提樹下悟單傳千嵒繞遍心花現山海同庚陸地仙徐居士過訪不值留偈附原韻後聖前賢元不二伏獅金栗總難分從看大地霑靈雨誰識青天無片雲不須相見已知君一句當陽賓主分遁跡深林惟養拙冷看世事若行雲既到家鄉罷問程管教玉石切須分雖然具隻超方眼莫認黃花當白雲徐居士禮義公禪師龕留偈附原韻囫圇無縫沒當中八幅花幡面面同相見不勞知客請一聲梧葉落秋空兩頭坐斷莫居中雲月溪山本是同擬欲尋蹤早已錯清光燦爛正當空雲龕寂寂素幃中面目全彰千里同三載影空消息斷遺風吹遍滿虛空癸卯除夕立惺元監院示偈傾心盡力且支撐護惜元初祖道場但向無中生箇有須教斷處意還常今宵說與諸人聽明日行藏爾自詳纍德修身為本務遇緣渾不假思量贈洞雲禪友古院堂堂一整新洞雲深鎖有知音焚香默坐君相委無舌人傳語最親乙巳歲朝立為一監院示偈秪為一事大因緣不惜疲勞立志堅聊借幻軀施幻法須將真實繼真傳打開自己摩尼藏把定祖翁般若船元旦揮毫無別語身心托出與龍天壽超明上人六十龐老家風到處便紅塵堆裏若青蓮驀然識得蟠桃熱花甲何堪計大年贈在初上座拄杖德山以此驗人究竟阿誰受屈拈起縱奪自由把住群英莫測為因知痛者希未肯等閒便擲而今敵手相逢領取三遭六十贈大隱道兄次福嚴韻諸緣頓息露全真百尺竿頭解轉身大地掀翻施妙用虛空打破果奇新天生道種多靈異宿佩如來無價珍覷透繁華超物外依然不改舊時人參謁雄聖惟極和尚不值有懷三度參求不見師聆音未卜在何時幾回燕語添惆悵數轉鶯啼動所思彼亦道豐留錫早我因德鮮遇緣遲傀無一法堪憑據幸有東風獨自知夢中觸著難接後人不覺嗟嘆吟醒老漢無端沒主張生蛇活逼要承當傷慚妄受龜毛拂繼後渾如六月霜步原韻沒絃琴不落宮商調轉新二十餘年空裏覓瞻風撥草少知音破茅菴兩扇柴扉不用關翠竹老梅真我友白雲堆裏露青山朽木舟把定風帆泛逆流野塘謾唱無生曲且向清波再下鉤破衲襖零零落落無人要脫下方知棒底恩夜半日輪當午照大潮登金栗次韻百川潮納海門關衝浪鯨鯢踴躍間慧日高懸光祖道法雲彌布潤家山綸音睿旨曾無繫御苑留恩豈等閒座側親聆猶在耳物情霑澤已忘還賀伏獅普聞法兄七旬大誕慈風久已播梅溪高隱精藍不露機道啓從心獅踞伏法弘祖席象龍齊緣疏懶洽時人意德厚嘗懷古聖儀欲慶無疆同萬壽蟠桃結後有蓄薇壽一音法兄七秩半偈留箋祝大椿百花如錦降全身鶴翹松頂沖霄漢桃放蓬萊隔遠津道振當湖尊齒德聲傳寰宇喜從心兄之重法標千古三十年來金石貞嘉禾故鄉菴秋海棠枝上亞出一花狀如芙蓉人皆異之索偈和贈原韻君家何故弄神通脫體新粧別樣容深究離名離相處覺花三昧現其中和二絶心華現處證圓通顯異呈奇總不容踏得故鄉田地穩乾坤別在一壺中花殊葉異卻同根現出淆訛辨主賓幸有東君親折取拈來隨處示天人善護一音法兄新建山門法幢高豎已多年閃電之機孰敢前撥轉門庭添瑞色千溪萬派自歸源久闊有懷匆匆話別久經年喜我同條不老仙善護一生承願力清標千古遞相傳贈白雲菴道融禪師建佛殿并樓白雲堆裏建樓臺露柱燈籠笑滿腮道德融和群象正沙盆扶起現如來和韻大地山河物我同虛懷惟有寸心紅雨窗靜坐無餘事秖聽颼颼桐葉風答明淨禪人截斷從前爛葛藤亦無一法可當情虛空撲落非他物信手拈來著著親參禪切莫守枯樁病退何須更假方識取臺山路上客婆婆元是女人粧蜂房頌其狀甚異有尺餘闊五臺層絡行遍青山萬木圍披雲吸露啓風規層層樓閣空中建密密幽居向下垂活計水邊漚影寂生涯花底謾徘徊奔流度刃遭人忌窠臼掀翻春正回又和韻空中釘橛欲成家隊隊翻飛繞水涯忽爾回思非活計全身跳出混雲霞臘梅頌疏枝清節淡霞粧不入春秋熱鬧場歷盡冰霜心愈赤當陽拈出自馨香寧縣張護法臘八以偈索和附原韻春夏秋冬過冬至計日三百三十二今日方聞道有成釋迦根器何遲滯和韻時節因緣今已至明星睹後元非二須知別是一乾坤閃電光中莫留滯邵夫人五十初度牙笏霓裳繞膝前翹松古柏並森妍翛然懶去朝金闕得志欣參趙老禪宿植靈根千載蔭花開劫外四時鮮已知天命無勞算柳緑桃紅慶大年壬子春分三日雄聖法叔和尚晚到遂以河渚詩出示索和依韻口占未識羅浮境遙聞繞水邊籬疏搜遠徑樹古卻垂肩為惜枝頭冷頻添爐裏煙欣逢佳客至猶喜杏花天同諸兄遊真如晚歸次尚散法兄韻玲瓏八面古皇新光映鴛湖徹底清落日穿林渾似錦暮鴉歸宿鬥疏親諸兄臨別次韻蓬門常掩勝居山為惜浮光未敢閒今夕共君談不二黎明分袂荻蘆閒壽則南禪宿五十五旬蝶夢覺前非急薦蓮居第一機淨土禪宗元不異竺乾震旦本同枝青桐露滴誰相委丹桂飄香我獨知道樹根盤空劫外真常壽算月輪齊壽洞雲禪師五十相忘塵世覺身閒慕道中年一著先按過知非春夢曉芰荷香裏悟真詮百年過半自悠然重整精藍事事便祖父田園耕已熟兒孫千古履源淵壽勝音尚徹禪師四十薰風堆裏降神仙火聚欣開白藕蓮鷲嶺峰高鵬展翮勝音法續鸞膠絃藏機未肯頻拈塵時至那容暫息肩喜有同儔擔祖印愧無佳句祝齊年壬子春仲望日過國福禪林隨喜萬佛懺時諸兄敘集惟自可道兄一別二十餘年今始得晤談心話舊晨夕忘倦恰又值道兄五旬大壽口占奉贈憶昔當年同事師誰知透網別分枝羡君深得寒山意愧我空垂浮定絲隔斷曹源數十里雲臻國福半聯詩奇逢天命重相會正是冰輪皎潔時哭雄聖法叔大和尚慕道尋訪十二年青黃四見近師顏自欣得獲驪龍寶志願同調獅子絃忽訝寶峰傾半座猶如法海覆慈船無孔鐵笛音雖杳幸有禪燈百世傳辭諸親法眷慶壽拙偈三首默報劬勞五十秋未嘗片刻去心頭一毫端上知根木不逐時人借意酬覷破諸方慶大壽縱經百歲有何奇箇中不著閒名相那記生辰與死期庚逢盛暑愈該辭燭麵糕桃不及時耕得心田平似掌腳跟點地大家知頌竹尊者步原韻四時積翠沒榮枯脫體心空不老臞歲歲添條留晚節山山獨坐笑村夫吟風愒月誰為伴頑石蒼松可作徒昔日擊聲空所有今將眼聽實難無華嚴期偶作重重華藏顯幽微慈氏門中截衆疑參遍百城煙水渺別峰相見證菩提性海陂平月正圓恆沙諸佛現眉端浮雲散盡天花墜到此方知法界寬示法源書記無邊香水總歸源十兆餘言半月宣識得不消彈指頃象王鼻孔一時拈雲棲遇王夫人扇頭乞偈書贈住福建時皈道教半生皈道繞天涯鳳詔雖尊未足誇喜有靈苗深植種拈來蓮社雨香花金風颯颯吹黃葉澗水潺潺泛白沙現前識得雲棲境三教同源共一家大士讚不戀金沙灘不居紫竹林皎皎長空月閒閒出岫雲欲行頻顧後憫極諸有情宏願立瓶水傾圓通妙應春風裏笑指衆生識自心識得心觀音元不在丹青咄又讚坐石上看淨瓶浮水面吟吟獨坐磐陀石漾漾清波泛玉瓶慈容俯視憐無盡悲願宏深度有情裁雲補袖兮覆護一切垂髮為瓔兮赴感群生蓮花襯足兮馨香遍界柳葉才拈兮大地霑恩咦難思妙相堪描畫覺海潮音著眼聽造釋迦文佛迦葉阿難尊者像募裝金佛座偈乘願莊嚴度有情杜門爭得遇知音至今未示黃金相須向檀那播口唇虛空疊作寶蓮臺撮土無非是法財覓箇有緣成聖聚沙植福現如來古南老人春字韻依韻二絶春水漲溪頭春霜滿屋頭春鶯頻喚惺春日落山頭春風堆裏露錐頭春夢誰人肯轉頭春色滿林觀不盡春茗香撲鼻尖頭臘月十五雪後歸棹口占西風吹散玉花飛湖面連坡去路迷凍鎖蓬窗寒入骨水晶宮裏作安居傷風不得睡通身發熱嗽難禁起坐披衣氣漸清出定了然更漏絶只聞鄰犬吠深村華亭勉力行化口占一偈三十年來林下居不彰名姓少人知只因記莂曹溪旨隨例飄蓬帶水泥贈明鏡王夫人二偈寶鏡臨臺胡漢彰分明舉似細參詳何須覿面親枯出半偈相酬意自長羡君無倦結良緣臘月能聞火裏蓮日用應酬休錯過呼童喚女總談禪贈寶璋公郎良哉宿授靈山記般若根深蔭有緣恆沙德種無邊界御苑留名蓋世傳贈松野禪師潛隱高齊傍鬧藍蓬門常掩勝居山蟠松經雪增新翠野衲披雲疊似班及至相逢唯務默卻思別後信音難而今擲下無鬚鎖猛著工夫透此關贈處林禪師難兄難弟啓嘉聲耳畔長聆不二門到處法幢甘雨潤滿林芳草悉霑恩舒懷擴量忘人我動止謙和道者心會得臨行留短句月輪當戶皎無雲贈竹影禪師同條天性志超群五葉流芳亙古今千里盡從初步起到家不必問途程贈道生禪師吾道何分北與南生機活潑化三千年來有意中流砥撥轉無多妙總禪雙桂森嚴條正發單傳直指急須參忽然證得非心物別立風規啓後賢示徒孫實傳剃染幼小離塵志不凡晚成須透上頭關祖翁田地平如掌細下深功莫放閒昔日于檇李保壽菴參常一老師迅速流光三十年矣于今戊午歲菊月匍匐苕溪萬善禪院叩謁慈顏親聆導誨慧燈高照龍象駢臻不異初參風景琛晨夕隨侍四旬日不離左右以遂本懷口占一偈憶自當時立志堅鴛鴦湖畔禮金仙沒絃琴撫無生曲不落宮商調別傳淨土禪宗同一體湘南潭北意何偏始知願力皆天定再續從前三十年洞庭歸舟中偶占七十二峰雲㵿㵿縹眇高頂露華曉太湖三萬六千頃閲盡古今人未了洞庭船子浪滔天范蠡湖船亦有年人在此中休問渡地分南北驗當賢要知一貫悟先賢吾道當思痛自鞭駒隙光陰空過了百年搔首亦徒然頌古世尊初生才降王宮盡底傾何須七步顯家珍誰知弄巧番成拙一棒于今纍子孫世尊升座法王法令不虛行多少英靈眼失睛莫道自起還自倒清風匝匝透知音世尊睹明星六載埋身慣脫空明星睹著面皮紅尋常一樣窗前月看到梅花便不同女子出定出定如何與入定罔明彈指休僥幸誤賺時人摸壁行至今不識其正令善財採藥莖草和根信手拈文殊豈受善財瞞雖然妙藥多靈驗服者反令病更添僧問法眼如何是佛法眼云汝是慧超一句無私活潑機電光石火撩雙眉若將語默為玄妙曲徑幽深路轉迷婆子燒菴二十年來龜證鱉任他寂寂與惺惺逢緣遇境誰為礙纍及婆婆本利傾瑞巖主人公歷劫相隨舊主人月潭底水無痕太平何用將軍令空使叮嚀費口唇竹篦子觸背二途俱坐斷分明舉似莫顢頇拈來一任敲風月點著令人心膽寒文殊三處度夏柳巷花街有甚拘頭陀著意轉生疑百千妙體毫端現莫向椎邊定是非禪堂規約夫參禪做工夫貴乎真實古德云七日不悟斬卻老僧頭去然諸人元要尋常動靜中將個本參話頭綿綿密密晝夜無間四威儀內不令散失所以進堂或一七或二七晝暮策勵正擊傍敲或見色聞聲或棒頭喝下驀然桶底脫落放下千斤擔子通身慶快便是真實受用若一向茫無所知止要在七日內討個分曉縱有上根利智領略得來也是門庭邊事未是到家消息鳥飛兔走迅速流光不得悠悠忽忽這一期內必要了此大事未悟者要悟已悟者必實證然說證說悟不過對迷而言踏者本來田地悟之一字亦無著處坐香規約雖不能全達先聖儀式聊立數條謹列于後掛鐘板師云秉佛祖權衡作叢林模範潑天爐鞴洪開閃電光中著眼驀擊一下云一敲迸出虛空髓草木皆為師子音機緣僧參師問甚處來僧云進澤師云曾進也未僧喝師云喝後聻僧頓足師云除了頓足別道一句僧擬議便禮拜師云鷂子過新羅師入堂一婆子出禮拜師云見個什麼道理婆云青天皎皎天下太平師云閒言語婆云一念不生師云正是生了也一日喫飯次師云終日喫飯不曾咬著一粒米意旨如何衆皆默然師云今日失利傍有一僧出便喝師云已遲八刻答問僧問兩頭坐斷中間除之云何安立答主山前案山後問雪覆千山因甚孤峰不白答向上看問猛虎以肉為命云何不食其子答好食不屬飽食問斷頭船子下楊州甚麼人把柁答切忌道著古南老和尚室中垂十問問雪子落紛紛為甚變成雨答一點水墨兩處成龍問河路既通楓橋船為甚不到答作麼作麼問既作村僧理合隨緣為甚只想山中答親言出親口問一錢為本萬錢為利早晚時價不定為甚滯貨不脫答甜瓜徹蒂甜苦葫連根苦問久旱逢甘雨物情皆喜為甚石敢當只是不肯點答兩重公案問昨日雨今日晴覆盆之隙尚可容光庭前竹子心裏日月如何照臨答從來不覆藏問路逢劍客須呈劍且道函人矢人相遇要得投分呈個甚麼即得答飢餐渴飲有甚難問炙背可以獻天子大好笑事因甚留在典籍答好事大家知問相看兩不厭只有敬亭山秖如敬亭山還具甚麼眼答瞎末問色斯舉矣翔而後集山梁雉鳥為甚又撞入網中答瞞人即得僧問如何是透法身句答好陳涼風問如何是學人自己答高聲問來問如何是皈根得旨答九九八十一問路逢道人不將語默對未審將甚麼對答兩眼對兩眼問行住坐臥不離這個如何是這個答提掇不起問忽遇三軍圍繞時如何答正是出頭時問如何是衲僧向上事答無毛鐵鷂貼天飛問如何是賓中主答信手拈來無不是問如何是主中賓答得意回來對月吟問如何是主中主答莫教打落當門齒問如何是賓中賓答簷前啼鳥送殘春佛事弘助禪人掩龕久依叢席動止遵規志勤協助弘願不違且道今日掩龕一句如何相委咄辭雲直入亂峰去杜鵑聲裏送春回禪人掩龕月輝禪人自幼出塵金剛密誦現堅固身殷勤事上十五載亦曾究竟虛空心雖然四大分離我今指汝歸真喝一喝云還鄉不假纖毫力佛土蓮邦任意行召大衆云且道掩卻真容向什麼處見他面目月穿潭底輝寒影紅白梅開滿院春一如監院封龕去年今日汝來請我今年此日我卻送汝去來生死無期好向目前薦取喝一喝云向這一喝下知歸清涼窟裏安身去起龕一如一如直心本色個裏無私臨行撒手故得自如十年執事勞苦不辭所以立你監院本望扶助常住豈期忙中縮手鬧裏抽身捨卻世間法作個逍遙人脫然恁麼去誰見不酸辛且道出門一句又作麼生擊龕云今朝指出無生路石女和歌送汝行丁未供本師和尚像是日義川義公二師神主同進祖堂指像云恭惟本師大和尚荒涼冷坐八年只道根深蒂固秪緣忤逆兒未遂守塔之志難酬之恩具副銅肝鐵膽不顧危亡掀開地軸天關無勞彈指移全身于參同菴左彰未來之榜樣供遺像于伏獅堂上示過去之風規大衆且道現在一句又作麼生捧位云一燈續焰光無盡二子相隨入祖堂趙氏張夫人掩棺生既無生滅亦非滅無滅無生洞然明白一念才興千差萬別識得根源便請休歇嗚呼趙氏夫人一生慕善心堅治家嚴密忽于四年前想起末後一著請益于山僧其奈夫人事繁體弱不能以禪定工夫策勵孰料四大分離措手不及現前若僧若俗要知葉落歸根人人本有時節且道掩卻靈棺如何指示卓拄杖云今朝親授靈山記佛國蓮邦任汝行奠善護一音法兄禪師當今法門雖盛覓個本色道人如星中揀月惟我法兄和尚行藏作略深達古德家風性直骨剛脫出時人窠窟三十年荷擔此事競競業業為法為人敬師始終不易誨徒晨夕無倦雖則久病室中其規有條其令嚴密所以同條一脈全賴于法兄共手相扶訃聞忽至如矛刺心如鳥折翼嗟乎伏師門下法運漸衰顧視左右云不識現前諸大德還描得令師塔樣麼其或未然更下注腳一會靈山卻儼然就中誰肯效耽源獅音斷處頻相和敬守遺風切莫遷遂展具尚饗般若義川法兄禪師舉龕法道傾頽愁得石人汗出雲龕起舞欣逢木馬嘶風幸我法兄和尚夙緣深植公案現成其生也四十年受檀越之宏護其死也百千世潛故身于福地若非大人作略焉能末後光輝召大衆云且道和尚即今在甚麼處琛義同手足豈敢囊藏聊與諸人通箇消息那伽長定十三秋發焰冰壺得自由趁此一輪霜月皎湘南潭北逞風流知客頓悟禪宿封龕者漢根盤梅里果結嘉禾二十年前伏獅會裏同參二十年後參同相依共住苦樂同甘勞辛不畏赤心常住至公而了不存私竭力為人真實而囊無積蓄見聞知識必生助道之心接待賢愚不著人我之相嗚呼一疾俄然撒手鐵牛也解悲傷召衆云頓悟禪師一生不會偷安而今急欲退身且道向甚麼處去百花叢裏翻筋斗正覺山前自在閒還鄉踏著無生路始信壺中別有天起龕相呼相喚老闍黎五十春光不見伊幻化境中幻化影杜鵑枝上杜鵑啼馥馥薰風呈舊面雙雙紫燕壘新泥急薦取目前機此際若逢靈利漢無陰陽地且安居喝一喝云八字門開大衆普送舉火藏身處沒蹤跡烈焰光中滅非滅沒蹤跡處莫藏身到者方知生不生淨裸裸兮峰頭翻白浪赤條條兮海底起紅塵頓悟老宿雖無神通妙用曾經先師爐鞴煆過幾番所以跳出時人窠窟何故聻末後叮嚀無別語秖教枯骨莫留存呈火炬云燒海鹽令修胡居士為道伴大隱禪師終九之辰請對靈小參師云琛上座自揣才疏德淺豈得明眼人前播揚家醜因奉護法令修老居士台命況吾大隱法兄禪師二十八年道義往來非是一日故不敢辭升于此座聊舉一隅嗚呼吾與兄翁始相見于伏獅後同儔于金粟或時秉興闊論忘疲或時靜裏細談心皆出乎本色常情並不自高而自大其居塵兮可為齊家之標格其出世兮咸稱法門之梁棟現前若僧若俗還知大隱禪師一生用處麼越俗超方已有年宗風戒月自孤圓瞥然覷破娑婆界撒手還源惺舊顏昨歲華山登戒品今朝火裏産青蓮不是鬧中忙縮手道風留與子孫傳咦滿堂孝眷如雲集九九須歸八十一卓拄杖下座己未秋前一日親題辭世偈這漢一生骨硬如釘一處轉腳最難移根二十四上知有此事十年克苦忘形四十九上憫絶娑婆世界覷得世態如冰實求早離如願業緣又使七春日今鐵釘如灰四大風火分散業落知秋正是歸根時候阿呵呵逍遙惟我參同菴記銘禾城東南五里有菴曰參同一時道化之盛衆皆稱一揆禪師云一揆里名家孫氏女適盛氏早寡感生之無常發出世願年二十六赴梅溪伏獅院禮祗園禪師剃髮受具以夙慧力入室扣參悉通機用不二載膺付囑蓋祗園傳法凡七人一揆其著也維祗園為金粟石車之子為臨濟三十二世孫現女身相建立宗旨四方學侶雲臻並時無兩而一揆拔萃於百人會中有智過於師之譽當祗園示寂後經營伏獅塔務偕法兄義公守師三載精進滋益勤其仲兄孫君子麟築靜室延之乃去伏獅而居焉是室也外繞清流後蔭修竹中結宇十餘間具回廊曲房之致堂前供佛有菴之名菴初名孫私之也既而子麟錫今名曰參同為一揆公之也公之者何夫一揆而承受大法弘化天人非孫氏之所得而女也其菴將佛法僧之是崇非一家之所得而主也且一揆自辛丑春因義公之歿從諸檀請繼席伏獅六載于丁未秋歸菴則其規模又加廣矣先丙午冬以祗園之塔之未善也移而置菴之左義公祔之為建塔院次年冬建中樓三間戊申前設墻門一帶己酉造廚浴諸雜室庚戌建大殿并莊嚴諸佛像雖菴也宛然有叢林風維一揆以誓願所存興舉勝業感動十方名尼暨於德門大家傾心施捨相與有成皇哉斯菴之以禪盛吾禾也然而榜曰參同子麟名之弘覺老人不之非復為書之此其說何也夫子麟受書于儒啓悟于佛旁通于老信三教之一源取名參同同者一也自其不一者而觀則佛之中教與宗為二宗之下復為五五之後分而什百幾于鬥爭故同之中有異焉自其一者而觀則萬法歸之凡人世語言文字資生術業俱與實相不相背違而況乎儒與道故異之中有同焉參異而得同猶夫揆什伯而見一師之號與菴之名似有合焉者以此消末法之爭并釋外道之疑豫麟之志則大矣非一揆烏足以當之哉豫觀一揆得法二十餘年絶名聞利養之念訓率諸學者惟以戒律為先而本分提撕必歸于第一義濟下宗風克興女中參同之名遂人重遠近之來者受之後之賢者守之子麟之志于斯大慰焉宜記而傳之使有永也銘曰大法西來塔廟是崇始自赤鳥實惟吳中迄千餘年化乃大洽僻壤名山禪林用匝參同肇基禾城東南由室而菴蔚成名藍門有宗風人無女相三教咸歸萬乘最上用書弘緒以告後人石乎不泐法爾常新康熙十四年四月八日賜同進士出身通奉大夫山西布政使司右布政使里人王庭撰參同一揆禪師行實師諱超琛字一揆嘉興縣人係大司寇孫簡肅公之曾孫女父太學茂時公賢母高氏法名超臻長兄子彰孝廉公官中翰仲兄文學子麟居士少年得道登三教壇禾中稱孫先生是也公有三女師居幼少聰敏精女工不由師傳而通書義兼繪墨其秉質不凡如此及笄適庠生盛君子逵克盡婦道事翁始孝其于胞姊屠又雍孝廉公夫人最友愛姑嫂妯娌間情禮備至人無閒言不幸盛君遘疾醫禱不效願以身殉復自念云倘棄所天徒死無益思投入空門為出世計時尊宿林泉老師與盛君相契見其病篤屢來開示師竊聽之道心益切未幾作未亡人時順治丁亥九月間也自後師毀容變服茹素持誦日不下樓一意焚修但未知參禪大書萬法俱空一心念佛于壁其立志堅貞如此戊子年子麟居士見妹壻溘先朝露生死心切苦志參禪語師云待吾拼卻性命倘有所悟汝不難出世居士奮身打七大事已明得心印即告師曰汝急做工夫絶後再蘇欺君不得然必參話頭經明師煆煉方得了手時祗園師翁係師瓜葛開堂梅溪伏獅師企慕有年但不出閨門未及叩謁只在家晝夜參究而話頭難破如吞鐵丸相似見居士逍遙放曠愈疑愈悶適有湯老太戒行精嚴引進彌切雖遇溽暑坐至夜分蚊刺遍體師漠不知也其工夫真切如此值歸寧與母夫人同志數人朝夕大士前梵音徹戶外一時感動遠近長齊皈教者數十人真有龐氏家風一日與居士趺坐蒲團各說志願師云吾志效祗老和尚居士云吾渡親入道寧為蓬萊雞大莫作塵世公侯厥后師出家道行酷似師翁居士嗣遇異人悟宿因可謂各愜所願者矣辛卯春師買舟往梅溪同母夫人參謁祗老師翁而一見稱為法器見居士寄呈偈語大加稱賞問師參何話頭答曰誰字師翁曰汝不必易話頭悉聽爾兄指教吾不難印證也即于是冬結制偕母夫人復到師翁座下同參話頭師坐至二七忽爾定去香盡四炷瞬息而過大地平沉洞徹本來面目居士聞之大快笑云這不唧𠺕漢遲至今朝方摸著鼻孔何鈍如之師翁即印可披剃壬辰付囑其真參實悟根器迅利如此由是師將盛門授産返還盛氏孫門嫁資仍歸孫氏赤條條不留一物親戚共嘆莫及而生敬焉彼時林泉老師辭世碧光菴心傳老師禾中大尊宿也師參謁後語居士云又添一箇法堂自明禪師與茂時公交契稱師為法門棟梁有偈喜贈如古南牧老和尚隱菴息老師翁尤加讚嘆其為師家深許如此不意甲午六月師母夫人病痢不起師服勞盡瘁哀號籲天母夫人臨終見青蓮紅蓮湧現口稱者三初夫人在家坐香參一念未生前以七為期至第五日定沖衝口說出眼底光明驀地來腹中自覺笑顏開今朝一片平陽地明日蓮花朵朵開素不諳偈連自家不知何故茲見蓮花兩朵適應讖語現紅緑幡幢往生樂土無疑七終歸菴九月師翁示寂師割股療師一痛幾殞天何奪我母而又奪我師我何生為默念付託之重力荷祖道志報師恩其孝親事師篤摯愛敬如此在伏獅守塔期滿思結一茅于水邊林下保養聖胎斯時義公師伯坐伏獅方丈勢難同居苦無其地子麟居士慨然創建靜室罄資落成約費千金一切什物完具丙申冬請師移錫厥後龍象駢臻皈依輻輳革故鼎新竟成蘭若辛丑臘月茂時公不諱師極盡孝道曰余向有老父挂心今可一意辦道矣壬寅正月因義公師伯回首伏獅虛席護法帷孺董公虔請所以復住伏獅六年其間為遷塔諸事載在師自敘文中癸卯冬師圓戒于弘覺國師得會覺珂和尚相契因晤適南和尚適師才高骨剛傲睨一世獨于師注意焉似有終身之托己酉季秋請適南師翁同子麟老居士到參同糾衆打七悉遵報恩規則鉗錘甚嚴師時遭訶斥禮下彌恭其時普明雖先付囑與法源僻居黎里禁足不及躬逢其盛為一惺元兩法弟各得力醒發焉適南師翁抱痾欲覓靜室師買地蓋椽衣之食之延醫莫療無何示寂師竭力盡禮請弘覺國師收骨入塔其尊賢重道死生不渝如此庚戊冬武林雄聖惟極和尚海內宗仰結制請師為首座機緣載在雄聖語録中與西堂靜諾師伯稱為莫逆而雄聖老和尚水乳交合期滿揮涕而別同檀越張老夫人往金粟飯衆天岸和尚以御賜爐衣供師不以法姪相待弘覺國師以祖衣送師楊墳師翁靈機大和尚天下宗師見師讚歎不休其為師尊欽崇如此姚江邵太常夫人遇師後不遠千里修候潯溪董微君帷孺喬梓禮意有加徽州孫老孺人明覺王孺人明慧吳翼桓夫人烏鎮沈孺人明證鹽官胡令修居士并室大隱禪師諸位親近多年久而彌切雲間王夫人明鏡率公郎拜師錫名實璋本土諸位不及備載其為四方檀護皈敬如此與同門諸昆季友愛終始如一常感義川義公兩師伯教導之力如陳菴主洞雲丘菴主心學洞庭菴主蓮乘暨貫一而交非泛常其睦于弟昆法眷如此常見末法掠虛失真工文詞為家私習機鋒為了當平素訓徒一以真操實履為要莫以文采口滑為工常云閻羅老子不怕你口快拈高峰祖師語開口動舌無益于人戒之莫言舉足動步無益于人戒之莫走舉心動念無益于人戒之莫起書于座右自警警徒御下老者安之少者懷之周其衣單均其勞逸隨才器使各得其宜間有負恩亦不之校其砥柱狂瀾安衆公平如此自四方多故以來屢遭歉歲常住淡泊日甚一日食有四五百指師備極劬勞供衆素恥募化以此進退維谷精神衰減己未春往洞庭遊穹窿見施度師對聯云食不耕衣不織飽暖須知慚愧打可憐罵可惜忍辱便是修行録歸警策大衆自此抱微恙食不下咽身無痛苦至六月絶粒半月飲水過日預知大限將至卻醫禁卜十七日邀子麟老居士至榻前分付法門後事語不及私老居士即録雲棲規約呈覽師云可刊在板一挂山門一挂佛殿一挂齊堂老居士云吾尚淹留塵世符到便行豈不快活師笑而頷之適南潯常一老和尚與師契闊十年忽法駕遠臨相見如一日師雖身抱沉痾猶執師弟之禮侍問不倦時六月草七始別覺在世無多日草九請子麟老居士內姪蘇門到菴呼徒不肖普明曰汝早付囑今付祖衣杖拂為參同住持祖師一脈善自護持普明五體投地辭之再三老居士曰此要承當毋容再讓呼法源明俊將如意云此幻有老人付卓老和尚傳至先師者今以付汝非比等閒切須珍重將拂子付為一明元云汝佛事說得幾句的將鐵如意付惺元明湛云汝心須如鐵守護常住老居士云吾看來法源上座得體接曹溪之正脈為一上座得用支參同之門庭師云是是老居士云有偈語否師云無老居士云無語句即為語句矣吾宗不立文字世尊說法四十九年未嘗說一字若有言句是名謗法今各位向無語句中會取師又云素封明麟隨我多年甚合我意服勤左右夙夜匪懈可謂孝矣可取我像描他在傍要題他幾句今不及矣曇現老成可作總管其餘執事派定井井有條武水朱近文名家子也棄家為高僧室人沈氏師嘗目為美器以子幼未及剃度老居士面云道在心不在境無論僧俗只要篤志修行今不幸無師可投莫若在家修持不壞世間相而修實相也師以為然又囑云吾一生小心謹慎一一言一動並不放膽汝等知之老居士見其末後光明一心不亂世所希有非數十年定力靜功行解相應焉克若此遣徒遍謝諸法眷檀越示期七月初三立秋永別至初三黎明先期報鐘師云又擔閣我一日至初四日辰時沐浴更衣說偈云這漢一生骨硬如釘一處轉腳最難移根二十四上知有此事十年克苦忘形四十九上憫絶娑婆世界覷得世態如水實求早離如願業緣又使七春目今鐵釘如灰四大風火分散葉落知秋正是歸根時候阿呵呵逍遙惟我端坐而逝其臨行安舒自在真得無上三昧如此普明等肝腸如裂遠近緇白哭聲震野如喪考妣遺命請老居士拈香領衆送進方丈入龕老居士遵命見之大慟曰昔陳白沙先生弔羅一峰先生大笑笑一峰死得其所復大哭哭失一良友世道無人其今日之謂乎遺命茶毗入塔奈師素不蓄資兼荒年挂薪玉粒常住如洗而老居士以古禮速葬不待制滿入塔為安同師內姪青巖青岫蘇門師外甥屠躬節居士捐資鳩工擬庚申清明塔豫參同祗老師翁右按師實悟實修實心實行不以文字經心凡有題贈書札並不留稿挂漏甚多所集語録若干不敢易一字誑一語師素不好名今始鏤板明知虛空著彩然非是無以信今而傳後一花可識無邊之春勺水可印圓滿之月不肖普明捐資敬付梨棗師距生于天啓乙丑六月一日辰時世壽五十五僧臘三十一生擔荷法門為道忘軀作人天榜樣普明等不能讚一辭且山野拙訥無文乏如椽手筆表揚萬一伏祈四方善信各賜珠璣為續燈之一助云康熙己未冬至日嗣法弟子普明謹狀自敘行略訓徒余俗姓孫世居角里二十六歲出家于本縣梅溪伏獅祗和尚會下披剃師係天童密老人嫡孫密乃臨濟三十世孫也順治壬辰二十八歲受囑三十歲六月母喪九月本師示寂時義公法兄繼席伏獅余守龕制滿時有結茆之念從無鉢資勢不能舉幸有仲兄子麟同志參禪先余著鞭精通三教皈于一源故建靜室名曰參同屬弘覺老人書額此參同菴之所由名也其叢桂軒關房曲廊丈室池亭水閣外有花卉修竹皆丙申年所建什物俱備至仲冬延余住焉時菴中惟六七人實得林下之樂白雲封戶圓寂無人六載如同一日不意辛丑春義公法兄忽染沉痾延余到榻囑託後事刻先師語録自己建塔立當家規訓徒衆以余法門手足欲完先師未了公案諸檀越特到參同堅請余念老父年邁以偈固辭誰料冬間嚴尊亦故當家病危潯溪帷孺董檀越再三相懇于壬寅正月勉強應請回見先師塔院在荒郊道路人難看守余身心如懸所以復進伏獅六年惟以塔事為念並不攀緣涉世至丙午臘月起工遷塔于參同菴左通新重建義公兄龕亦荼毗于師塔之側丁未清明造塔已竣中秋即伏獅退院冬間建樓三楹戊申春啓墻門一帶六間己酉造東廝浴室三間庚戌佛誕日建大殿余出家時孫氏嫁資盛門分産悉皆捐棄僧俗耳目共知二十六年法門辛勤中有十年興建土木漸成蘭若皆出于十方檀護信心中來所以日夕訓誨徒輩若非忘形死心堅持戒行何能俾其永遠不朽欲報佛祖必須敬守清規真實履踐冷淡家風千古不泯遵此數語方可同居俾世世守之毋負我一生苦志也
