body:
  text: 一揆禪師像贊參同一揆禪師語錄序古德云只貴子見地不貴子操履此極則語也蓋自威音以後迄于盡未來際未有舍見地而談禪道者其如錯會者率以半青不黃承虛接響妄謂一切不礙菩提苦哉茲見參固尼一揆禪師語錄深嘆其為乘願之菩薩也師為石車和尚的孫祗園大德法嗣向知其履踐超卓不愧古人而其說法又單提向上絕去廉纖如此豈非所謂行解相應者乎真末法之光明幢矣良由師既得法後復參請于木老人古南和尚不肯自足其徹法源底宜哉今參同已成叢席法子多得人余與師之兄子麟氏交最久故知之深輒弁數言于語錄之首以見今日固有末山妙總其人者云爾時康熙庚申歲次孟春月約菴道人施博敬序
